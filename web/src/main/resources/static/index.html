<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game of City</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #1e1e2e; font-family: system-ui, -apple-system, sans-serif; }
        canvas { display: block; }
        #hud {
            position: absolute;
            top: 12px;
            left: 12px;
            color: #cdd6f4;
            font-size: 14px;
            background: rgba(30, 30, 46, 0.85);
            padding: 10px 14px;
            border-radius: 8px;
            line-height: 1.6;
            pointer-events: auto;
            min-width: 180px;
        }
        #hud .label { color: #a6adc8; }
        #hud .paused { color: #f9e2af; font-weight: bold; }
        #hud select, #hud input[type=range] {
            background: #313244;
            color: #cdd6f4;
            border: 1px solid #45475a;
            border-radius: 4px;
            padding: 2px 4px;
            font-size: 12px;
        }
        #hud select { cursor: pointer; }
        #hud .control-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
            margin-top: 4px;
        }
        #hud .control-row .label { min-width: 50px; }
        #hud button {
            background: #45475a;
            color: #cdd6f4;
            border: none;
            border-radius: 4px;
            padding: 4px 10px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 6px;
        }
        #hud button:hover { background: #585b70; }
        #inspector {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 280px;
            background: rgba(30, 30, 46, 0.92);
            color: #cdd6f4;
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 13px;
            line-height: 1.7;
            max-height: 80vh;
            overflow-y: auto;
        }
        #inspector-title {
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 6px;
            color: #f5c2e7;
        }
        #inspector .row { display: flex; justify-content: space-between; }
        #inspector .row .label { color: #a6adc8; }
        #inspector .bar-wrap {
            height: 6px;
            background: #313244;
            border-radius: 3px;
            margin: 2px 0 4px;
            overflow: hidden;
        }
        #inspector .bar {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s;
        }
        #inspector select, #inspector input[type=range] {
            background: #313244;
            color: #cdd6f4;
            border: 1px solid #45475a;
            border-radius: 4px;
            padding: 2px 4px;
            font-size: 12px;
            width: 100%;
        }
        #inspector .edit-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 4px 0;
        }
        #inspector .edit-row .label { min-width: 60px; flex-shrink: 0; }
        #inspector .edit-row input { flex: 1; }
        #inspector .edit-row span:last-child { min-width: 30px; text-align: right; }
        #inspector .brain-select { margin: 6px 0; }
        #inspector .level-header {
            color: #a6adc8;
            font-weight: bold;
            margin-top: 8px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        #cmdbar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 28px;
            background: rgba(15, 15, 25, 0.92);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            font-size: 12px;
            z-index: 100;
            padding: 0 12px;
        }
        #cmdbar .key {
            color: #8990a8;
            background: #313244;
            border-radius: 3px;
            padding: 1px 5px;
            font-size: 11px;
            font-weight: bold;
        }
        #cmdbar .act { color: #cdd6f4; margin-right: 12px; }
        #hud { top: 40px; }
        #inspector { top: 40px; }
        #status {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #cdd6f4;
            font-size: 1.5rem;
            text-align: center;
        }
        #status .dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: #a6e3a1;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div id="cmdbar" style="display:none">
        <span class="key">Space</span><span class="act">Pause</span>
        <span class="key">B</span><span class="act">Brain</span>
        <span class="key">+/-</span><span class="act">Speed</span>
        <span class="key">N</span><span class="act">Generate</span>
        <span class="key">Esc</span><span class="act">Deselect</span>
    </div>
    <div id="status"><span class="dot"></span>Connecting to simulation...</div>
    <div id="hud" style="display:none">
        <div><span class="label">Tick:</span> <span id="tick">0</span></div>
        <div><span class="label">Peeps:</span> <span id="peepCount">0</span></div>
        <div><span class="label">Speed:</span> <span id="speed">1x</span></div>
        <div id="pausedLabel" class="paused" style="display:none">PAUSED</div>
        <div class="control-row">
            <span class="label">Brain:</span>
            <select id="brainSelect">
                <option value="Utility">Utility</option>
                <option value="Pyramid">Pyramid</option>
                <option value="Wave">Wave</option>
                <option value="Random">Random</option>
            </select>
        </div>
        <hr style="border-color:#45475a;margin:8px 0">
        <div style="font-size:11px;color:#a6adc8;margin-bottom:4px">Generation</div>
        <div class="control-row">
            <span class="label">Size:</span>
            <input type="range" id="genSize" min="20" max="100" value="40" style="width:80px">
            <span id="genSizeLabel">40</span>
        </div>
        <div class="control-row">
            <span class="label">Peeps:</span>
            <input type="range" id="genPeeps" min="10" max="200" value="50" style="width:80px">
            <span id="genPeepsLabel">50</span>
        </div>
        <div class="control-row">
            <span class="label">Organic:</span>
            <input type="range" id="genOrganic" min="0" max="100" value="0" style="width:80px">
            <span id="genOrganicLabel">0%</span>
        </div>
        <button id="generateBtn">Generate City</button>
    </div>
    <div id="inspector" style="display:none">
        <div id="inspector-title">Inspector</div>
        <div id="inspector-body"></div>
    </div>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="city.js"></script>
</body>
</html>
